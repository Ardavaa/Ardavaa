name: Update profile art

on:
  schedule:
    # Run daily at 00:00 UTC = 7 AM WIB
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Fetch contributions
        run: GH_PROFILE_USER=Ardavaa python scripts/fetch_contributions.py
        env:
          GH_PROFILE_USER: Ardavaa

      - name: Render heatmap
        run: python scripts/render_heatmap_svg.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Update contribution heatmap $(date +'%Y-%m-%d')"
          git push
